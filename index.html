<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rateform</title>
	<link rel="icon" type="image/svg+xml" href="favicon.svg">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="style/style.css">
	<link rel="stylesheet" href="style/components.css">
</head>

<body>

	<!-- ░░ ШАПКА ░░ -->
	<header id="site-header">
		<div class="header-inner">
			<a href="#feed" class="logo">
				<span class="logo-mark">▮</span>
				Rateform
			</a>

			<nav class="main-nav" id="main-nav">
				<a href="#feed" class="nav-link" data-route="feed">Лента</a>
				<a href="#top" class="nav-link" data-route="top">Топ</a>
				<a href="#search" class="nav-link" data-route="search">Поиск</a>
				<a href="#playlist" class="nav-link" data-route="playlist">Плейлист</a>
				<a href="#upload" class="nav-link nav-link--upload" data-route="upload">+ Загрузить</a>
			</nav>

			<div class="header-user" id="header-user">
				<button class="theme-toggle" id="btn-theme" title="Сменить тему">
					<svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
						<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
					</svg>
					<svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
						style="display:none">
						<circle cx="12" cy="12" r="5" />
						<line x1="12" y1="1" x2="12" y2="3" />
						<line x1="12" y1="21" x2="12" y2="23" />
						<line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
						<line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
						<line x1="1" y1="12" x2="3" y2="12" />
						<line x1="21" y1="12" x2="23" y2="12" />
						<line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
						<line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
					</svg>
				</button>
				<button class="notif-btn" id="btn-notifications" title="Уведомления" style="display:none">
					<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
						style="width:16px;height:16px">
						<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
						<path d="M13.73 21a2 2 0 0 1-3.46 0" />
					</svg>
					<span class="notif-badge" id="notif-badge" style="display:none"></span>
				</button>
				<button class="btn btn--ghost" id="btn-login">Войти</button>
			</div>
		</div>
	</header>

	<!-- ░░ КОНТЕНТ ░░ -->
	<main id="app">
		<div class="loader" id="initial-loader">
			<div class="loader-spinner"></div>
		</div>
	</main>

	<!-- ░░ МОБИЛЬНАЯ НАВИГАЦИЯ ░░ -->
	<nav id="mobile-nav" class="player-hidden">
		<div class="mobile-nav-inner">
			<a href="#feed" class="mobile-nav-item" data-route="feed">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
					<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
					<polyline points="9 22 9 12 15 12 15 22" />
				</svg>
				<span>Лента</span>
			</a>
			<a href="#top" class="mobile-nav-item" data-route="top">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
					<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
					<path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
					<path d="M4 22h16" />
					<path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
					<path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
					<path d="M18 2H6v7a6 6 0 0 0 12 0V2z" />
				</svg>
				<span>Топ</span>
			</a>
			<a href="#upload" class="mobile-nav-item mobile-nav-item--upload" data-route="upload">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
					<line x1="12" y1="5" x2="12" y2="19" />
					<line x1="5" y1="12" x2="19" y2="12" />
				</svg>
				<span>Загрузить</span>
			</a>
			<a href="#playlist" class="mobile-nav-item" data-route="playlist">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
					<path
						d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
				</svg>
				<span>Плейлист</span>
			</a>
			<button class="mobile-nav-item" id="mobile-profile-btn">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
					<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
					<circle cx="12" cy="7" r="4" />
				</svg>
				<span>Профиль</span>
			</button>
		</div>
	</nav>

	<!-- ░░ МОДАЛКА АВТОРИЗАЦИИ ░░ -->
	<div class="modal-overlay" id="auth-modal" aria-hidden="true">
		<div class="modal">
			<button class="modal-close" id="modal-close" aria-label="Закрыть">✕</button>
			<div class="modal-tabs">
				<button class="modal-tab active" data-tab="login">Войти</button>
				<button class="modal-tab" data-tab="register">Регистрация</button>
			</div>
			<form class="auth-form" id="form-login">
				<div class="field">
					<label class="field-label">Email</label>
					<input class="field-input" type="email" id="login-email" placeholder="mc@bars.ru" required>
				</div>
				<div class="field">
					<label class="field-label">Пароль</label>
					<input class="field-input" type="password" id="login-password" placeholder="••••••••" required>
				</div>
				<button class="btn btn--primary btn--full" type="submit">Войти</button>
				<p class="auth-error" id="login-error"></p>
			</form>
			<form class="auth-form" id="form-register" style="display:none">
				<div class="field">
					<label class="field-label">Имя / псевдоним</label>
					<input class="field-input" type="text" id="reg-name" placeholder="MC Vasya" required>
				</div>
				<div class="field">
					<label class="field-label">Email</label>
					<input class="field-input" type="email" id="reg-email" placeholder="mc@bars.ru" required>
				</div>
				<div class="field">
					<label class="field-label">Пароль</label>
					<input class="field-input" type="password" id="reg-password" placeholder="Минимум 6 символов"
						required>
				</div>
				<button class="btn btn--primary btn--full" type="submit">Зарегистрироваться</button>
				<p class="auth-error" id="reg-error"></p>
			</form>
			<div class="modal-divider"><span>или</span></div>
			<button class="btn btn--google btn--full" id="btn-google">
				<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path
						d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
						fill="#4285F4" />
					<path
						d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
						fill="#34A853" />
					<path
						d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
						fill="#FBBC05" />
					<path
						d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
						fill="#EA4335" />
				</svg>
				Войти через Google
			</button>
		</div>
	</div>

	<!-- ░░ УВЕДОМЛЕНИЕ ░░ -->
	<div class="toast" id="toast" aria-live="polite"></div>

	<script type="module" src="js/app.js"></script>
</body>

</html>
