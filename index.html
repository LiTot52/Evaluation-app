<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Rateform</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
		rel="stylesheet">

	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/components.css">

</head>

<body>

	<!-- ░░ ШАПКА ░░ -->
	<header id="site-header">
		<div class="header-inner">

			<a href="#feed" class="logo">
				<span class="logo-mark">▮</span>
				Rateform
			</a>

			<nav class="main-nav" id="main-nav">
				<a href="#feed" class="nav-link" data-route="feed">Лента</a>
				<a href="#top" class="nav-link" data-route="top">Топ</a>
				<a href="#upload" class="nav-link nav-link--upload" data-route="upload" id="nav-upload">
					+ Загрузить
				</a>
			</nav>

			<div class="header-user" id="header-user">
				<!-- JS вставит аватар/кнопку войти -->
				<button class="btn btn--ghost" id="btn-login">Войти</button>
			</div>

		</div>
	</header>

	<!-- ░░ ОСНОВНОЙ КОНТЕНТ ░░ -->
	<main id="app">
		<!-- Роутер вставляет сюда нужный View -->
		<div class="loader" id="initial-loader">
			<div class="loader-spinner"></div>
		</div>
	</main>

	<!-- ░░ МОДАЛКА АВТОРИЗАЦИИ ░░ -->
	<div class="modal-overlay" id="auth-modal" aria-hidden="true">
		<div class="modal">
			<button class="modal-close" id="modal-close" aria-label="Закрыть">✕</button>

			<div class="modal-tabs">
				<button class="modal-tab active" data-tab="login">Войти</button>
				<button class="modal-tab" data-tab="register">Регистрация</button>
			</div>

			<!-- Форма входа -->
			<form class="auth-form" id="form-login">
				<div class="field">
					<label class="field-label">Email</label>
					<input class="field-input" type="email" id="login-email" placeholder="mc@bars.ru" required>
				</div>
				<div class="field">
					<label class="field-label">Пароль</label>
					<input class="field-input" type="password" id="login-password" placeholder="••••••••" required>
				</div>
				<button class="btn btn--primary btn--full" type="submit">Войти</button>
				<p class="auth-error" id="login-error"></p>
			</form>

			<!-- Форма регистрации -->
			<form class="auth-form hidden" id="form-register">
				<div class="field">
					<label class="field-label">Имя / псевдоним</label>
					<input class="field-input" type="text" id="reg-name" placeholder="MC Vasya" required>
				</div>
				<div class="field">
					<label class="field-label">Email</label>
					<input class="field-input" type="email" id="reg-email" placeholder="mc@bars.ru" required>
				</div>
				<div class="field">
					<label class="field-label">Пароль</label>
					<input class="field-input" type="password" id="reg-password" placeholder="Минимум 6 символов"
						required>
				</div>
				<button class="btn btn--primary btn--full" type="submit">Зарегистрироваться</button>
				<p class="auth-error" id="reg-error"></p>
			</form>

			<div class="modal-divider">
				<span>или</span>
			</div>
			<button class="btn btn--google btn--full" id="btn-google">
				<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path
						d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
						fill="#4285F4" />
					<path
						d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
						fill="#34A853" />
					<path
						d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
						fill="#FBBC05" />
					<path
						d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
						fill="#EA4335" />
				</svg>
				Войти через Google
			</button>
		</div>
	</div>

	<!-- ░░ УВЕДОМЛЕНИЕ ░░ -->
	<div class="toast" id="toast" aria-live="polite"></div>

	<!-- ░░ СКРИПТЫ ░░ -->
	<!-- Firebase CDN  -->
	<script type="module" src="js/firebase-config.js"></script>
	<script type="module" src="js/store.js"></script>
	<script type="module" src="js/router.js"></script>
	<script type="module" src="js/app.js"></script>

</body>



<script src="./js/firebase-config.js"></script>
<script src="./js/store.js"></script>
<script src="./js/router.js"></script>
<script src="./js/app.js"></script>

</html>
